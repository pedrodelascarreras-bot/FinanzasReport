name: 📊 Reporte Financiero Semanal

on:
  schedule:
    # Viernes 18:00 Argentina = Viernes 21:00 UTC
    - cron: '0 21 * * 5'
    # Lunes 11:00 Argentina (mediodía) = Lunes 14:00 UTC
    - cron: '0 14 * * 1'
  workflow_dispatch:

jobs:
  generate-and-send-report:
    name: Generar y enviar reporte
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        run: npm install
      - name: Ejecutar reporte
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
        run: node main.js
      - name: Guardar PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporte-semanal
          path: reporte-semanal.pdf
          retention-days: 30
